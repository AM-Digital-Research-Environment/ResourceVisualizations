name: Build word clouds

# Manual only — run after new transcripts / abstracts land (mirrors the in-Omeka
# "Regenerate now" rhythm). Regenerates the lemmatised word-frequency inputs in
# asset/data/wordclouds/ and commits them; the in-Omeka precompute folds them in
# on the next regenerate, with an in-PHP tokeniser as the fallback.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: tools/wordclouds/requirements.txt

      - name: Install spaCy + language models
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/wordclouds/requirements.txt
          python -m spacy download en_core_web_sm
          python -m spacy download fr_core_news_sm

      - name: Build word-cloud inputs
        run: python tools/wordclouds/build_wordclouds.py

      - name: Commit regenerated inputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add asset/data/wordclouds/
          if git diff --staged --quiet; then
            echo "No word-cloud changes."
          else
            git commit -m "Word clouds: regenerate lemmatised frequencies [skip ci]"
            git push
          fi
